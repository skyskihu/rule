name: Update Rules

on:
  push:
    branches: [ main ]
    paths:
      - ".github/**"
      - "source/**"
      - "scripts/**"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  process:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      SING_RULE_SET_MAX_VERSION: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: |
          pip install pyyaml
          # sing-box
          wget -qO- https://github.com/SagerNet/sing-box/releases/download/v1.14.0-alpha.17/sing-box-1.14.0-alpha.17-linux-amd64.tar.gz | tar -xz
          sudo install -m 0755 sing-box-1.14.0-alpha.17-linux-amd64/sing-box /usr/local/bin/sing-box
          # mihomo
          wget -qO- https://github.com/MetaCubeX/mihomo/releases/download/v1.19.24/mihomo-linux-amd64-v1-v1.19.24.gz | gunzip -d > mihomo
          sudo install -m 0755 mihomo /usr/local/bin/mihomo

      - name: Process source file
        run: |
          python scripts/process_raw.py
          python scripts/process_clash.py
          python scripts/convert_clash_to_sing.py

      - name: Compile file
        run: |
          bash scripts/compile_clash_domain.sh
          bash scripts/compile_clash_ip_cidr.sh
          bash scripts/compile_sing.sh

      - name: Push branch
        run: |
          bash scripts/push_raw.sh
          bash scripts/push_compile.sh
